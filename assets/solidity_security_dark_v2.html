<!DOCTYPE html>
<style>
@keyframes pulse-red    { 0%,100%{opacity:.75} 50%{opacity:1} }
@keyframes pulse-amber  { 0%,100%{opacity:.65} 50%{opacity:.98} }
@keyframes pulse-green  { 0%,100%{opacity:.75} 50%{opacity:1} }
@keyframes pulse-purple { 0%,100%{opacity:.55} 50%{opacity:.95} }
@keyframes flow-dash    { to { stroke-dashoffset: -24; } }
@keyframes glow-red     { 0%,100%{filter:drop-shadow(0 0 5px #E24B4A99)} 50%{filter:drop-shadow(0 0 14px #E24B4Aee)} }
@keyframes glow-green   { 0%,100%{filter:drop-shadow(0 0 5px #63992299)} 50%{filter:drop-shadow(0 0 14px #639922ee)} }
@keyframes glow-purple  { 0%,100%{filter:drop-shadow(0 0 5px #7F77DD99)} 50%{filter:drop-shadow(0 0 16px #7F77DDee)} }
@keyframes grid-fade    { 0%,100%{opacity:.04} 50%{opacity:.09} }
@keyframes float-dot    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

.bg   { fill:#080e1a }
.grid { stroke:#1a3a5c; stroke-width:.5; animation:grid-fade 4s ease-in-out infinite }
.vuln { animation:pulse-red   2.2s ease-in-out infinite }
.test { animation:pulse-amber 1.8s ease-in-out infinite .4s }
.fix  { animation:pulse-green 2s   ease-in-out infinite .8s }
.chk  { animation:pulse-purple 2.5s ease-in-out infinite .6s }
.ar   { stroke:#E24B4A; stroke-dasharray:6 4; animation:flow-dash 1s linear infinite; fill:none }
.ag   { stroke:#639922; stroke-dasharray:6 4; animation:flow-dash 1s linear infinite .5s; fill:none }
.ad   { stroke:#7F77DD; stroke-dasharray:5 4; animation:flow-dash 1.2s linear infinite; fill:none }
.gr   { animation:glow-red    2.2s ease-in-out infinite }
.gg   { animation:glow-green  2s   ease-in-out infinite .8s }
.gp   { animation:glow-purple 2.5s ease-in-out infinite .6s }
.dot  { fill:#7F77DD; animation:float-dot 2s   ease-in-out infinite }
.dot2 { fill:#E24B4A; animation:float-dot 2.4s ease-in-out infinite .3s }
.dot3 { fill:#639922; animation:float-dot 1.8s ease-in-out infinite .6s }
.t0 { fill:#f0eeff; font-size:13px; font-weight:500 }
.t1 { fill:#a0a8c8; font-size:11px }
.t2 { fill:#c8c4e8; font-size:14px; font-weight:500; letter-spacing:.5px }
</style>
